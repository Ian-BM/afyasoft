<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pricing — AfyaSoft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1 class="page-title">Simple, transparent pricing</h1>
      <p class="page-subtitle">One plan. Everything included. Cancel anytime.</p>
    </header>

    <main class="page-main">
      <div class="pricing-float-wrap">
      <article class="pricing-card" aria-labelledby="plan-name">
        <h2 id="plan-name" class="visually-hidden">Starter plan</h2>

        <div class="pricing-card__badge" data-animate-badge>
          <span class="pricing-card__badge-text">Starter</span>
        </div>

        <div class="pricing-card__price-block">
          <p class="pricing-card__price-line">
            <span class="pricing-card__amount">10,000</span>
            <span class="pricing-card__currency">TZS</span>
          </p>
          <p class="pricing-card__frequency">per month</p>
        </div>

        <div class="pricing-card__features">
          <p class="pricing-card__includes">INCLUDES</p>
          <ul class="pricing-card__list">
            <li class="pricing-card__item">
              <span class="pricing-card__check" aria-hidden="true"></span>
              <span>Inventory Management</span>
            </li>
            <li class="pricing-card__item">
              <span class="pricing-card__check" aria-hidden="true"></span>
              <span>Fast POS System</span>
            </li>
            <li class="pricing-card__item">
              <span class="pricing-card__check" aria-hidden="true"></span>
              <span>Expiry Tracking</span>
            </li>
            <li class="pricing-card__item">
              <span class="pricing-card__check" aria-hidden="true"></span>
              <span>Sales Reports</span>
            </li>
          </ul>
        </div>

        <a class="pricing-card__cta" href="#" data-animate-cta>
          Get Started<span class="pricing-card__cta-arrow" aria-hidden="true"> →</span>
        </a>
      </article>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
